<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>junior-site — versions</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    html {
      font-size: 300%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f5f5;
    }
    main {
      text-align: center;
      padding: 2rem;
      max-width: 30rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 1.5rem;
      color: #333;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    a.btn, button.btn {
      display: inline-block;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-family: inherit;
      text-decoration: none;
      color: #fff;
      background: #222;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    a.btn:hover {
      background: #444;
    }
    button.btn:disabled,
    a.btn.disabled {
      background: #bbb;
      cursor: not-allowed;
      pointer-events: none;
    }
    .warning {
      display: none;
      margin: 0 0 1.5rem;
      padding: 0.875rem 1rem;
      border-radius: 0.375rem;
      background: #fff4d6;
      border: 1px solid #e6c870;
      color: #5a4400;
      font-size: 0.9rem;
      text-align: left;
      line-height: 1.5;
    }
    .warning code {
      background: rgba(0, 0, 0, 0.08);
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      font-size: 0.85em;
    }
    body.no-server .warning {
      display: block;
    }
    body.no-server a.btn {
      background: #bbb;
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>新生支持辦公室網站 Mock Up</h1>
    <div class="warning" role="alert">
      <strong>No server detected.</strong><br>
      v0 needs a static HTTP server (it uses <code>fetch()</code> for JSON).
      Start it with:
      <pre style="margin:0.5rem 0 0;"><code>python3 serve.py</code></pre>
      then open <code>http://localhost:8000/</code>.
    </div>
    <div class="buttons">
      <a class="btn" href="v0/site/index.html">v0</a>
      <a class="btn" href="v1/site/index.html">v1</a>
      <a class="btn" href="v2/site/index.html">v2</a>
      <a class="btn" href="v3/site/index.html">v3</a>
      <a class="btn" href="v3_2/site/index.html">v3_2</a>
      <a class="btn" href="v4/site/index.html">v4</a>
      <a class="btn" href="v-May15/site/index.html">v-May15</a>
    </div>
  </main>
  <script>
    if (location.protocol === "file:") {
      document.body.classList.add("no-server");
    }
  </script>
</body>
</html>
