<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>junior-site</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    html {
      font-size: 300%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f5f5;
    }
    main {
      text-align: center;
      padding: 2rem;
      max-width: 30rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 1.5rem;
      color: #333;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    a.btn, button.btn {
      display: inline-block;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-family: inherit;
      text-decoration: none;
      color: #fff;
      background: #222;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    a.btn:hover {
      background: #444;
    }
    button.btn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <main>
    <h1>新生支持辦公室網站 Mock Up</h1>
    <div class="buttons">
      <a class="btn" href="academic/index.html">學務處</a>
      <button class="btn" type="button">國際處</button>
    </div>
  </main>
</body>
</html>
